<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Living Bunker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="main-menu" class="menu-overlay">
        <div class="menu-panel">
            <div class="menu-title">THE LIVING BUNKER</div>
            <div class="menu-subtitle">semiotic survival simulation</div>
            <button id="new-game-btn" class="pixel-button">Начать новую игру</button>
            <button id="continue-btn" class="pixel-button">Продолжить</button>
            <button id="settings-btn" class="pixel-button">Настройки</button>
            <div class="menu-hint">Demo mode works without API keys.</div>
        </div>
    </div>

    <div id="settings-menu" class="menu-overlay hidden">
        <div class="settings-panel">
            <div class="menu-title small">SETTINGS</div>
            <label class="settings-row">
                <span>Provider</span>
                <select id="provider-mode">
                    <option value="default">Groq/Cerebras env keys</option>
                    <option value="demo">Demo mode</option>
                    <option value="openai_compatible">OpenAI-compatible</option>
                </select>
            </label>
            <label class="settings-row">
                <span>OpenAI-compatible URL</span>
                <input id="openai-base-url" type="text" placeholder="https://api.openai.com/v1/chat/completions">
            </label>
            <label class="settings-row">
                <span>API key</span>
                <input id="openai-api-key" type="password" placeholder="sk-...">
            </label>
            <label class="settings-row">
                <span>Model</span>
                <input id="openai-model" type="text" placeholder="gpt-4o-mini">
            </label>
            <label class="settings-row">
                <span>Anomaly spawn rate</span>
                <input id="spawn-rate" type="range" min="0" max="0.01" step="0.0005">
            </label>
            <div id="settings-status" class="menu-hint"></div>
            <div class="settings-actions">
                <button id="save-settings-btn" class="pixel-button">Сохранить</button>
                <button id="close-settings-btn" class="pixel-button secondary">Назад</button>
            </div>
        </div>
    </div>

    <div id="ui-layer">
        <div id="status-panel">
            <h2>Residents</h2>
            <div id="residents-list"></div>
        </div>
        <div id="log-panel">
            <h3>Event Log</h3>
            <div id="logs"></div>
        </div>

        <!-- God Console -->
        <div id="god-console">
            <div id="console-output">
                <div class="console-line system">> System Initialized. Architect Online.</div>
            </div>
            <div id="console-input-area">
                <span class="prompt-char">></span>
                <input type="text" id="console-input" placeholder="Enter command or narrative request..." autocomplete="off">
            </div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script src="data/rooms.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
