<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Living Bunker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="ui-layer">
        <div id="status-panel">
            <h2>Residents</h2>
            <div id="residents-list"></div>
        </div>
        <div id="log-panel">
            <h3>Event Log</h3>
            <div id="logs"></div>
        </div>

        <!-- God Console -->
        <div id="god-console">
            <div id="console-output">
                <div class="console-line system">> System Initialized. Architect Online.</div>
            </div>
            <div id="console-input-area">
                <span class="prompt-char">></span>
                <input type="text" id="console-input" placeholder="Enter command or narrative request..." autocomplete="off">
            </div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script src="js/renderer.js"></script>
    <script src="js/pathfinding.js"></script>
    <script src="js/config.js"></script>
    <script src="js/StateManager.js"></script>
    <script src="data/rooms.js"></script>
    <script src="js/helpers.js"></script>
    <script src="js/WorldState.js"></script>
    <script src="js/Resident.js"></script>
    <script src="js/Anomaly.js"></script>
    <script src="js/RoomBuilder.js"></script>
    <script src="js/UIController.js"></script>
    <script src="js/ConsoleController.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
